        // Global State variables
        let selectedChapterIndex = 0;
        let activeTab = 0;
        let fontSizeMultiplier = 1.0;
        let categoryFilter = 'all';
        let searchQuery = '';
        let bookmarks = JSON.parse(localStorage.getItem('MIL_Assamese_Bookmarks') || '[]');

        // App Initialization
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            updateBookmarkBadge();
            renderChaptersList();
            viewChapter(0);
            lucide.createIcons();
        });

        // Theme management
        function initTheme() {
            if (localStorage.getItem('MIL_Theme') === 'dark' || 
                (!('MIL_Theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('MIL_Theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('MIL_Theme', 'dark');
            }
        }

        // Font scaling
        function changeFontSize(val) {
            fontSizeMultiplier = Math.max(0.8, Math.min(2.0, fontSizeMultiplier + val));
            const rootTextContainers = document.querySelectorAll('.dynamic-font-scale');
            rootTextContainers.forEach(el => {
                applyFontScaleToElement(el);
            });
            // Also store preference
            localStorage.setItem('MIL_Font_Scale', fontSizeMultiplier);
        }

        function applyFontScaleToElement(el) {
            const baseSize = parseFloat(el.getAttribute('data-base-size') || '16');
            el.style.fontSize = `${baseSize * fontSizeMultiplier}px`;
            el.style.lineHeight = `${baseSize * 1.5 * fontSizeMultiplier}px`;
        }

        // Bookmark management
        function toggleBookmark(questionId) {
            const index = bookmarks.indexOf(questionId);
            if (index > -1) {
                bookmarks.splice(index, 1);
            } else {
                bookmarks.push(questionId);
            }
            localStorage.setItem('MIL_Assamese_Bookmarks', JSON.stringify(bookmarks));
            updateBookmarkBadge();
            
            // Re-render current layout or current bookmarks lists
            const btn = document.getElementById(`bookmark-btn-${questionId}`);
            if (btn) {
                if (bookmarks.includes(questionId)) {
                    btn.classList.add('text-indigo-600', 'dark:text-indigo-400');
                    btn.innerHTML = '<i class="w-5 h-5 fill-current"></i>';
                } else {
                    btn.classList.remove('text-indigo-600', 'dark:text-indigo-400');
                    btn.innerHTML = '<i class="w-5 h-5"></i>';
                }
                lucide.createIcons();
            }
            if (document.getElementById('bookmark-drawer').classList.contains('translate-x-0')) {
                renderBookmarks();
            }
        }

        function updateBookmarkBadge() {
            const badge = document.getElementById('bookmark-badge');
            if (bookmarks.length > 0) {
                badge.innerText = bookmarks.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function toggleBookmarkPanel() {
            const drawer = document.getElementById('bookmark-drawer');
            const overlay = document.getElementById('backdrop-overlay');
            if (drawer.classList.contains('translate-x-full')) {
                renderBookmarks();
                drawer.classList.remove('translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 50);
            } else {
                drawer.classList.add('translate-x-full');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function renderBookmarks() {
            const container = document.getElementById('bookmark-list');
            if (bookmarks.length === 0) {
                container.innerHTML = `

                        <p class="text-xs text-slate-500 mt-1">প্ৰশ্নবোৰৰ কাষত থকা বুকমাৰ্ক আইকনটো টিপি সংৰক্ষণ কৰক।</p>
                    </div>`;
                lucide.createIcons();
                return;

            let html = '';
            // Locate each bookmarked Q&A

                            <button onclick="toggleBookmark('${foundQ.id}')" class="absolute top-4 right-4 text-indigo-500 hover:text-red-500 transition-colors" title="বুকমাৰ্ক আঁতৰাওক">

                            <span class="text-[10px] uppercase tracking-wider text-primary-500 dark:text-primary-400 font-bold">${chTitle}</span>

                            <div class="text-xs text-slate-600 dark:text-slate-300 border-t border-indigo-100/30 dark:border-slate-700/50 pt-2 leading-relaxed whitespace-pre-line">${foundQ.answer}</div>

        // Chapters lists rendering
        function renderChaptersList() {
            const container = document.getElementById('chapters-list-container');
            let html = '';

            const filtered = chaptersData.filter(ch => {
                const matchesCat = categoryFilter === 'all' || ch.type === categoryFilter;
                const matchesSearch = searchQuery === '' || 
                    ch.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                    ch.author.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-center text-xs text-slate-400 dark:text-slate-500 py-6">কোনো পাঠ পোৱা নগ'ল!</p>`;
                return;
            }

            filtered.forEach(ch => {
                const isSelected = chaptersData[selectedChapterIndex].id === ch.id;
                const activeClasses = isSelected 
                    ? 'bg-primary-600 dark:bg-primary-600 text-white shadow-lg shadow-primary-500/10 scale-[1.01]' 
                    : 'hover:bg-slate-50 dark:hover:bg-slate-800/60 text-slate-700 dark:text-slate-300';

                html += `

                            <div class="min-w-0">
                                <p class="font-extrabold text-[13.5px] truncate">${ch.title}</p>
                                <p class="text-[10px] opacity-80 truncate-none ${isSelected ? 'text-primary-100' : 'text-slate-500 dark:text-slate-400'}">${ch.author}</p>
                            </div>
                        </div>
                        <span class="text-[9px] px-2 py-0.5 rounded-full uppercase tracking-wider shrink-0 select-none ${isSelected ? 'bg-white/25 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400'}">${ch.type}</span>

            container.innerHTML = html;
        }

        function setCategoryFilter(cat) {

            ['all', 'পদ্য', 'গদ্য'].forEach((type, index) => {
                const map = { 'all': 'cat-all', 'পদ্য': 'cat-pady', 'গদ্য': 'cat-gady' };
                const btn = document.getElementById(map[type]);
                if (type === cat) {
                    btn.className = "flex-1 py-1 px-2 text-xs font-semibold rounded-lg bg-primary-600 text-white text-center shadow-md";
                } else {
                    btn.className = "flex-1 py-1 px-2 text-xs font-medium rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-center hover:bg-slate-200 dark:hover:bg-slate-700 transition"
                }
            });
            renderChaptersList();
        }

        function filterChapters() {
            const query = document.getElementById('chapter-search').value;
            searchQuery = query;
            renderChaptersList();
        }

        function selectChapterById(id) {
            const index = chaptersData.findIndex(ch => ch.id === id);
            if (index > -1) {
                viewChapter(index);
                renderChaptersList(); // re-render list for styling updates
                // On small screens, scroll down to content
                if (window.innerWidth < 1024) {
                    document.getElementById('workspace-tabs').scrollIntoView({ behavior: 'smooth' });
                }
            }
        }

        // Load the selected chapter view
        function viewChapter(index) {
            selectedChapterIndex = index;
            const chapter = chaptersData[index];

            document.getElementById('active-title').innerText = chapter.title;
            document.getElementById('active-group').innerText = chapter.group;
            document.getElementById('active-type').innerText = chapter.type;
            document.getElementById('active-author-label').innerText = chapter.author;
            document.getElementById('active-summary').innerText = chapter.summary;

            // Load contents for active workspace tab
            renderActiveTabContent();
        }

        function setActiveTab(idx) {
            activeTab = idx;
            // Update UI Styling for Tabs
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById(`tab-${i}`);
                if (i === idx) {
                    btn.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm tracking-wide transition-all flex items-center justify-center gap-2 bg-primary-600 text-white shadow-md shadow-primary-500/10";
                } else {
                    btn.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm tracking-wide transition-all flex items-center justify-center gap-2 hover:bg-slate-100 dark:hover:bg-slate-800/80 text-slate-600 dark:text-slate-300";
                }
            }
            renderActiveTabContent();
        }

        function renderActiveTabContent() {
            const chapter = chaptersData[selectedChapterIndex];
            const container = document.getElementById('tab-content-container');
            let html = '';

            switch(activeTab) {
                case 0:
                    // Q&A Tab
                    html = renderQATab(chapter);
                    break;
                case 1:
                    // Author View
                    html = renderAuthorTab(chapter);
                    break;
                case 2:
                    // Glossary / Vocabulary
                    html = renderGlossaryTab(chapter);
                    break;
            }

            container.innerHTML = html;
            lucide.createIcons();

            // Apply font scaling
            const elements = container.querySelectorAll('.dynamic-font-scale');
            elements.forEach(applyFontScaleToElement);
        }

        // Tab sub-renderers
        function renderQATab(chapter) {
            let listHtml = '';
            chapter.questions.forEach(q => {
                const isBookmarked = bookmarks.includes(q.id);
                const bookmarkedClass = isBookmarked ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 dark:text-slate-500 hover:text-indigo-500';
                const bookmarkIcon = isBookmarked ? 'bookmark' : 'bookmark';

                listHtml += `
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm hover:border-slate-300 dark:hover:border-slate-700 transition relative">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex gap-2.5 items-center">
                                ${q.isGrammar ? '<span class="bg-teal-500/10 text-teal-600 dark:text-teal-400 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider select-none border border-teal-500/10">ব্যাকৰণ</span>' : ''}
                            </div>
                            <button id="bookmark-btn-${q.id}" onclick="toggleBookmark('${q.id}')" class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition ${bookmarkedClass}" title="বুকমাৰ্ক সংৰক্ষণ কৰক">
                                <i data-lucide="${bookmarkIcon}" class="w-5 h-5 ${isBookmarked ? 'fill-current' : ''}"></i>
                            </button>
                        </div>
                        <h4 class="font-extrabold text-base md:text-lg text-slate-900 dark:text-white mt-1 pr-10 leading-snug">${q.question}</h4>
                        <div class="mt-3 text-slate-600 dark:text-slate-400 text-sm md:text-base border-t border-slate-100 dark:border-slate-800/50 pt-3 leading-relaxed whitespace-pre-line dynamic-font-scale" data-base-size="15">${q.answer}</div>
                    </div>`;
            });

            return `
                <div class="flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-base font-bold text-slate-900 dark:text-white flex items-center gap-2">
                            <i data-lucide="file-question" class="w-5 h-5 text-primary-500"></i>
                            মহত্বপূৰ্ণ প্ৰশ্নোত্তৰ সংগ্ৰহ (${chapter.questions.length})
                        </h3>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${listHtml}
                    </div>
                </div>`;
        }

        function renderAuthorTab(chapter) {
            return `
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-sm flex flex-col gap-5">
                    <div class="flex items-center gap-4 border-b border-slate-100 dark:border-slate-800 pb-4">
                        <div class="bg-primary-500/10 p-3 rounded-2xl text-primary-600 dark:text-primary-400">
                            <i data-lucide="user-round" class="w-8 h-8"></i>
                        </div>
                        <div>
                            <span class="text-xs uppercase font-extrabold text-slate-400 tracking-wider">কবি/লেখক পৰিচিতি</span>
                            <h3 class="text-xl md:text-2xl font-extrabold text-slate-900 dark:text-white mt-0.5">${chapter.author}</h3>
                        </div>
                    </div>
                    <div class="text-slate-600 dark:text-slate-300 text-sm md:text-base leading-relaxed tracking-wide whitespace-pre-line dynamic-font-scale" data-base-size="16">
                        ${chapter.aboutAuthor}
                    </div>
                </div>`;
        }

        function renderGlossaryTab(chapter) {
            if (!chapter.vocabulary || chapter.vocabulary.length === 0) {
                return `
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-8 text-center shadow-sm">
                        <i data-lucide="languages" class="w-12 h-12 mx-auto mb-3 opacity-30 text-slate-400"></i>
                        <p class="text-slate-500 font-semibold text-sm">এই অধ্যায়তোৰ কোনো কঠিন শব্দাৰ্থ নাই।</p>
                    </div>`;
            }

            let rowsHtml = '';
            chapter.vocabulary.forEach(vocab => {
                rowsHtml += `
                    <tr class="border-b last:border-b-0 border-slate-100 dark:border-slate-800/60 hover:bg-slate-50/50 dark:hover:bg-slate-800/20 transition-all">
                        <td class="py-3 px-4 font-extrabold text-slate-900 dark:text-white text-base md:text-lg select-all">${vocab.word}</td>
                        <td class="py-3 px-4 text-slate-600 dark:text-slate-300 text-sm md:text-base leading-relaxed dynamic-font-scale" data-base-size="15">${vocab.meaning}</td>
                    </tr>`;
            });

            return `
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-sm flex flex-col gap-4">
                    <h3 class="text-base font-bold text-slate-800 dark:text-white flex items-center gap-2">
                        <i data-lucide="book-marked" class="w-5 h-5 text-indigo-500"></i>
                        শব্দাৰ্থ তথা কঠিন শব্দ কোষ (${chapter.vocabulary.length})
                    </h3>
                    
                    <div class="overflow-hidden border border-slate-200 dark:border-slate-800 rounded-2xl bg-slate-50/30">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-100 dark:bg-slate-800 text-xs font-bold text-slate-500 uppercase tracking-wider">
                                    <th class="py-3 px-4 w-1/3">কঠিন শব্দ</th>
                                    <th class="py-3 px-4">অৰ্থ/বাখ্যা</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        // End of Script Layout
    </script>
</body>
</html>
